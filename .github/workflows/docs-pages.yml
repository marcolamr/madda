# Publica o site VitePress + TypeDoc em GitHub Pages.
# 1. Repositório → Settings → Pages → Build: GitHub Actions.
# 2. Site de projeto: URL https://<user>.github.io/<repo>/ (base definida automaticamente).
# 3. Repositório user.github.io: cria variável VITEPRESS_BASE = / em Settings → Secrets and variables → Actions → Variables.

name: Deploy docs (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - "apps/docs/**"
      - "typedoc.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "packages/**"
      - ".github/workflows/docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-docs
  cancel-in-progress: true

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build docs (TypeDoc + VitePress)
        run: pnpm run docs:build
        env:
          VITEPRESS_BASE: ${{ vars.VITEPRESS_BASE || format('/{0}/', github.event.repository.name) }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/.vitepress/dist

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
